name: Daily Regression

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  test:
    name: Shard ${{ matrix.shard }}/4

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env
        run: |
          cat <<EOF > .env
          E2E_SAUCEDEMO_BASE_URL=${{ vars.E2E_SAUCEDEMO_BASE_URL }}
          E2E_JSONPLACEHOLDER_BASE_URL=${{ vars.E2E_JSONPLACEHOLDER_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          PASSWORD=${{ secrets.PASSWORD }}
          WRONG_PASSWORD=${{ secrets.WRONG_PASSWORD }}
          EOF

      - name: Run Regression Tests
        run: |
          npx playwright test \
            --grep @regression \
            --workers=2 \
            --shard=${{ matrix.shard }}/4

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  report:
    name: Merge Reports

    if: always()

    needs: [test]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Download Blob Reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge Reports
        run: |
          npx playwright merge-reports \
            --reporter html \
            ./all-blob-reports

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 30

  cleanup:
    name: Cleanup Blob Reports

    if: always()

    needs: [report]

    runs-on: ubuntu-latest

    steps:
      - name: Delete Blob Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data } =
              await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });

            await Promise.all(
              data.artifacts
                .filter(a => a.name.startsWith('blob-report-'))
                .map(a =>
                  github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: a.id,
                  })
                )
            );