name: Playwright Manual Run

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite'
        required: true
        default: '@smoke'
        type: choice
        options:
          - '@api'
          - '@e2e'
          - '@smoke'
          - '@regression'

      workers:
        description: 'Workers per shard'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '5'
          - '10'

jobs:
  test:
    name: Shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    container: 
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Create .env
        run: |
          cat <<EOF > .env
          E2E_SAUCEDEMO_BASE_URL=${{ vars.E2E_SAUCEDEMO_BASE_URL }}
          E2E_JSONPLACEHOLDER_BASE_URL=${{ vars.E2E_JSONPLACEHOLDER_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          PASSWORD=${{ secrets.PASSWORD }}
          WRONG_PASSWORD=${{ secrets.WRONG_PASSWORD }}
          EOF

      - name: Run Tests
        run: |
          npx playwright test \
            --grep "${{ github.event.inputs.suite }}" \
            --workers=${{ github.event.inputs.workers }} \
            --shard=${{ matrix.shard }}/4

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  report:
    name: Merge Reports
    if: always()
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Download Blob Reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge Reports
        run: |
          npx playwright merge-reports \
            --reporter html \
            ./all-blob-reports

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 1

  cleanup:
    name: Cleanup Blob Reports
    if: always()
    needs: [report]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Delete Blob Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data } =
              await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });

            await Promise.all(
              data.artifacts
                .filter(a => a.name.startsWith('blob-report-'))
                .map(a =>
                  github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: a.id,
                  })
                )
            );